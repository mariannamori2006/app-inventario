<div id="modalProducto" class="modal">
    <div class="modal-content card">
        <div class="modal-header">
            <h2 id="modalTitulo">Detalles del Equipo</h2>
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
        </div>
        
        <form id="formEdicionRapida">
            <input type="hidden" id="edit_id">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nombre del Producto</label>
                    <input type="text" id="edit_nombre" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="edit_categoria" required>
                        </select>
                </div>
                <div class="form-group">
                    <label>Stock Actual</label>
                    <input type="number" id="edit_stock" required>
                </div>
                <div class="form-group">
                    <label>Precio Compra (S/)</label>
                    <input type="number" step="0.01" id="edit_p_compra">
                </div>
                <div class="form-group">
                    <label>Precio Venta (S/)</label>
                    <input type="number" step="0.01" id="edit_p_venta">
                </div>
            </div>
            <!-- Imagen del producto -->
            <div class="form-group full-width" id="seccionImagen">
                <label>Imagen del Producto</label>
                <div style="display:flex; align-items:center; gap:16px;">
                    <img id="preview_imagen" src="" alt="Sin imagen" 
                        style="width:80px; height:80px; object-fit:cover; border-radius:8px; 
                                background:rgba(255,255,255,0.05); display:none;">
                    <div id="placeholder_imagen" style="width:80px; height:80px; border-radius:8px;
                        background:rgba(255,255,255,0.05); display:flex; align-items:center; 
                        justify-content:center; color:var(--text-muted);">
                        <i class="fa-solid fa-image" style="font-size:24px;"></i>
                    </div>
                    <div>
                        <input type="file" id="input_imagen" accept=".jpg,.jpeg,.png,.webp" 
                            style="display:none;" onchange="previewImagen(this)">
                        <button type="button" onclick="document.getElementById('input_imagen').click()" 
                                class="btn-submit" style="padding:8px 16px; font-size:12px;">
                            <i class="fa-solid fa-upload"></i> Subir imagen
                        </button>
                        <p id="nombre_imagen" style="font-size:11px; opacity:.5; margin-top:4px;"></p>
                    </div>
                </div>
            </div>
            <div id="btnContenedorEdicion" style="margin-top: 20px;">
            </div>
        </form>
    </div>
</div>
