    <!-- PANEL LATERAL DE DETALLE IA -->

        border: 1px solid var(--border-color);
        border-radius: 16px;
        z-index: 1000;
        transition: transform 0.3s ease, opacity 0.3s ease;
        overflow-y: auto;
        padding: 30px 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        opacity: 0;
        pointer-events: none;
        ">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">

            <span onclick="cerrarPanelIA()" style="cursor:pointer; font-size:20px; opacity:.6;">&times;</span>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
            <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px;">
                <div style="font-size:11px; opacity:.5; margin-bottom:4px;">Stock actual</div>
                <div id="panel_stock" style="font-size:18px; font-weight:700;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px;">
                <div style="font-size:11px; opacity:.5; margin-bottom:4px;">Ritmo de venta</div>
                <div id="panel_ritmo" style="font-size:18px; font-weight:700;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px;">
                <div style="font-size:11px; opacity:.5; margin-bottom:4px;">Días restantes</div>
                <div id="panel_dias" style="font-size:18px; font-weight:700;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px;">
                <div style="font-size:11px; opacity:.5; margin-bottom:4px;">Margen</div>
                <div id="panel_margen" style="font-size:18px; font-weight:700;"></div>
            </div>
        </div>

        <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px; margin-bottom:12px;">

            <div id="panel_quiebre" style="font-size:15px; font-weight:600;"></div>
        </div>

        <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px; margin-bottom:12px;">
            <div style="font-size:11px; opacity:.5; margin-bottom:4px;"><i class="fa-solid fa-chart-line"></i> Tendencia semanal</div>
            <div id="panel_tendencia" style="font-size:15px; font-weight:600;"></div>
        </div>

        <div id="panel_dormido_box" style="display:none; background:rgba(245,158,11,0.1); border:1px solid #f59e0b; border-radius:8px; padding:12px; margin-bottom:12px;">
            <i class="fa-solid fa-moon" style="color:#f59e0b;"></i>
            <span id="panel_dormido" style="font-size:13px; color:#f59e0b; margin-left:6px;"></span>
        </div>

        <div id="panel_grafico_box" style="display:none; margin-top:16px; border-top:1px solid rgba(255,255,255,0.07); padding-top:16px;">
            <div style="font-size:11px; opacity:.5; margin-bottom:8px;"><i class="fa-solid fa-chart-area"></i> Proyección 30 días</div>

            </div>
        </div>
    </div>

    <!-- Overlay oscuro -->
    <div id="overlayIA" onclick="cerrarPanelIA()" style="
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.4);
        z-index:999;
    "></div>
